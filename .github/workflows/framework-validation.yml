name: Framework Validation

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate framework (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Engineering tests
        run: go test ./...

      - name: Static analysis
        run: go vet ./...

      - name: Race detector
        if: runner.os == 'Linux'
        run: go test -race ./...

      - name: Framework validator
        run: go run ./cmd/spec-framework validate --product-root examples/events --framework-root .

      - name: Decision diagnostics
        run: go run ./cmd/spec-framework decisions check --product-root examples/events --framework-root . --strict
