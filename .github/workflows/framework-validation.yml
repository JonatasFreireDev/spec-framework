name: Framework Validation

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate framework
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Syntax check
        run: |
          node --check engineering/validators/framework-validator.mjs
          node --check engineering/move-artifact.mjs
          node --check engineering/tests/run-tests.mjs

      - name: Engineering tool tests
        run: node engineering/tests/run-tests.mjs

      - name: Framework validator
        run: node engineering/validators/framework-validator.mjs
