name: Framework Validation

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate framework (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Syntax check
        run: npm run check

      - name: Engineering tool tests
        run: npm test

      - name: Package contents
        run: npm run pack:dry

      - name: Framework validator
        run: npm run validate
