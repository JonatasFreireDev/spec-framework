<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Project Portal</title>
  <style>
    :root{--bg:oklch(1 0 0);--surface:oklch(.975 .004 262);--surface-2:oklch(.95 .008 262);--ink:oklch(.21 .006 262);--muted:oklch(.48 .016 262);--line:oklch(.88 .008 262);--primary:oklch(.47 .13 268);--primary-dark:oklch(.36 .13 268);--primary-soft:oklch(.94 .03 268);--success:oklch(.55 .13 150);--warning:oklch(.7 .14 75);--danger:oklch(.57 .18 28);--radius:8px;--shadow:0 10px 28px oklch(.2 .02 262/.08)}
    *{box-sizing:border-box}html{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink);background:var(--bg)}body{margin:0;min-width:320px}.skip{position:absolute;inset-inline-start:12px;top:-48px;background:var(--ink);color:white;padding:10px 14px;border-radius:6px;z-index:10}.skip:focus{top:12px}button,input{font:inherit}button{cursor:pointer}button:disabled{cursor:not-allowed;opacity:.48}button:focus-visible,input:focus-visible,[tabindex]:focus-visible{outline:3px solid oklch(.65 .15 268/.75);outline-offset:2px}.app{height:100vh;display:grid;grid-template-columns:352px minmax(0,1fr);background:var(--bg);overflow:hidden}
    aside{border-inline-end:1px solid var(--line);padding:22px 14px 14px;display:flex;flex-direction:column;min-height:0;gap:18px;background:var(--bg)}.brand{display:flex;align-items:center;gap:10px;padding:0 7px;font-size:18px;font-weight:700}.mark{inline-size:27px;block-size:27px;border-radius:7px;background:var(--primary);display:grid;place-items:center;color:white;font-size:15px}.search{position:relative}.search input{width:100%;border:1px solid var(--line);border-radius:8px;padding:11px 42px 11px 36px;background:var(--bg);color:var(--ink)}.search::before{content:"⌕";position:absolute;inset-inline-start:12px;top:7px;font-size:22px;color:var(--muted)}.shortcut{position:absolute;inset-inline-end:8px;top:8px;padding:2px 5px;border-radius:4px;background:var(--surface-2);font-size:12px;color:var(--muted)}.filters{display:flex;gap:7px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;scrollbar-width:thin}.chip{flex:none;border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:7px;padding:7px 10px;font-size:13px}.chip[aria-pressed="true"]{border-color:var(--primary);background:var(--primary-soft);color:var(--primary-dark);font-weight:650}.tree{overflow-y:auto;overflow-x:hidden;min-height:0;flex:1;padding:2px 4px 2px 2px;scrollbar-width:thin;scrollbar-color:var(--line) transparent}.tree::-webkit-scrollbar{width:9px}.tree::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px}.tree ul{padding:0;margin:0;list-style:none}.tree li{min-width:0}.tree-row{display:flex;align-items:center;gap:7px;min-height:34px;padding:4px 7px;border-radius:6px;color:var(--ink);text-align:start;width:100%;border:0;background:transparent}.tree-row:hover{background:var(--surface)}.tree-row[aria-current="true"]{background:var(--primary-soft);color:var(--primary-dark);box-shadow:inset 3px 0 var(--primary)}.indent{display:inline-block;width:var(--indent)}.twisty{width:16px;color:var(--muted);font-size:13px}.node-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px}.tree-status{margin-inline-start:auto;font-size:13px}.folder-icon{color:var(--muted)}.sidebar-footer{border-top:1px solid var(--line);padding-top:12px;display:grid;gap:8px}.identity{border:1px solid var(--line);padding:10px;border-radius:7px;display:flex;align-items:center;gap:9px;font-size:13px}.avatar{inline-size:28px;block-size:28px;border-radius:50%;display:grid;place-items:center;background:var(--primary-soft);color:var(--primary-dark);font-weight:700}
    main{min-width:0;min-height:0;display:flex;flex-direction:column}.topbar{min-height:73px;border-bottom:1px solid var(--line);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;gap:18px}.topbar h1{margin:0;font-size:23px;letter-spacing:-.025em}.sync{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:7px}.dot{inline-size:8px;block-size:8px;border-radius:50%;background:var(--success)}.content{padding:20px 26px 26px;min-width:0;overflow:auto}.decisions{border:1px solid var(--line);border-radius:var(--radius);margin-bottom:16px}.decisions h2{font-size:15px;margin:0;padding:14px 17px;border-bottom:1px solid var(--line)}.priority-row{display:grid;grid-template-columns:minmax(160px,1fr) minmax(160px,1fr) minmax(200px,1.3fr) auto;gap:15px;align-items:center;padding:12px 17px;border:0;border-bottom:1px solid var(--line);background:var(--bg);width:100%;text-align:left}.priority-row:last-child{border-bottom:0}.priority-row:hover{background:var(--surface)}.priority-title{display:block;font-weight:650;line-height:1.3}.priority-title+ .subtle{display:block;margin-top:3px}.subtle{font-size:13px;color:var(--muted)}.status{display:inline-flex;align-items:center;gap:6px;font-size:13px;white-space:nowrap}.status::before{content:"●";font-size:10px}.status.pending{color:oklch(.55 .14 75)}.status.approved{color:var(--success)}.status.rejected,.status.blocked{color:var(--danger)}.status.progress{color:var(--primary)}.status.stale{color:oklch(.53 .12 250)}.status.neutral{color:var(--muted)}.review-link{color:var(--primary-dark);font-weight:650;font-size:13px}
    .workspace{border:1px solid var(--line);border-radius:var(--radius);min-height:540px;display:grid;grid-template-columns:minmax(0,1fr) 300px;background:var(--bg)}.artifact-pane{min-width:0;padding:26px 28px}.artifact-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}.artifact-head h2{margin:0 0 9px;font-size:28px;letter-spacing:-.035em}.facts{display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:13px}.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-top:21px}.tab{border:0;background:transparent;padding:10px 10px;color:var(--muted);border-bottom:2px solid transparent;font-size:14px}.tab[aria-selected="true"]{color:var(--primary-dark);border-color:var(--primary);font-weight:650}.document{max-width:76ch;padding-top:20px;line-height:1.58;overflow-wrap:anywhere}.document h1,.document h2,.document h3{line-height:1.24;margin:22px 0 8px}.document h1{font-size:24px}.document h2{font-size:20px}.document h3{font-size:17px}.document pre{overflow:auto;background:var(--surface);padding:12px;border-radius:6px}.document code{font-family:ui-monospace,SFMono-Regular,Consolas,monospace}.document table{border-collapse:collapse;max-width:100%;overflow:auto;display:block}.document td,.document th{border:1px solid var(--line);padding:7px;text-align:left}.decision-panel{border-inline-start:1px solid var(--line);padding:26px;display:flex;flex-direction:column;gap:18px}.decision-panel h2{font-size:19px;margin:0}.decision-panel h3{font-size:14px;margin:0 0 6px}.panel-section{border-bottom:1px solid var(--line);padding-bottom:14px}.panel-section:last-of-type{border:0}.relation{display:block;padding:5px 0;color:var(--ink);font-size:13px;overflow-wrap:anywhere}.actions{margin-top:auto;display:grid;gap:9px}.btn{border:1px solid var(--primary);border-radius:7px;min-height:42px;padding:9px 14px;background:var(--bg);color:var(--primary-dark);font-weight:650}.btn.primary{background:var(--primary);color:white}.btn.primary:hover{background:var(--primary-dark)}.btn:hover{background:var(--primary-soft)}.helper{font-size:12px;line-height:1.45;color:var(--muted);margin:0}
    .folder-head{display:flex;gap:18px;align-items:flex-start;padding:4px 0 20px}.folder-icon-large{font-size:35px;color:var(--primary)}.folder-head h2{margin:0 0 6px;font-size:27px}.toolbar{border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:12px 0;display:flex;justify-content:space-between;align-items:center;gap:14px}.selection{display:flex;align-items:center;gap:12px;font-size:14px}.link{border:0;background:transparent;color:var(--primary-dark);padding:0}.table-wrap{overflow:auto}.artifact-table{width:100%;border-collapse:collapse;min-width:650px}.artifact-table th{text-align:left;font-size:12px;color:var(--muted);font-weight:600;padding:13px 10px;border-bottom:1px solid var(--line)}.artifact-table td{padding:13px 10px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:top}.artifact-table tr.selected{background:var(--primary-soft)}.artifact-table tr:hover{background:var(--surface)}.artifact-table input{inline-size:17px;block-size:17px;accent-color:var(--primary)}.artifact-name{font-weight:650;display:block}.row-reason{font-size:12px;color:var(--muted);padding-top:5px;max-width:32ch}.empty{padding:50px 16px;text-align:center;color:var(--muted)}
    dialog{border:0;border-radius:10px;padding:0;max-width:min(520px,calc(100vw - 32px));box-shadow:var(--shadow)}dialog::backdrop{background:oklch(.15 .01 262/.42)}.dialog-body{padding:24px}.dialog-body h2{margin:0 0 8px;font-size:21px}.dialog-body label{font-size:13px;font-weight:650;display:grid;gap:6px;margin-top:14px}.dialog-body input,.dialog-body textarea{border:1px solid var(--line);border-radius:7px;padding:10px;width:100%;resize:vertical;color:var(--ink)}.dialog-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:20px}.toast{position:fixed;inset-inline-end:18px;inset-block-end:18px;max-width:350px;background:var(--ink);color:white;border-radius:8px;padding:12px 14px;box-shadow:var(--shadow);z-index:5}.hidden{display:none!important}
    .identity-user button{margin-inline-start:auto}.identity-editor{display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:6px}.identity-editor input{min-width:0;border:1px solid var(--line);border-radius:6px;padding:7px}.inline-request{display:grid;gap:8px}.inline-request label{font-size:13px;font-weight:650}.inline-request textarea{width:100%;resize:vertical;border:1px solid var(--line);border-radius:7px;padding:9px;color:var(--ink)}.inline-request-actions{display:flex;gap:8px}.decision-panel .actions{position:sticky;bottom:0;padding-top:14px;background:var(--bg);box-shadow:0 -12px 18px oklch(1 0 0/.94)}.decision-panel .panel-section .status{display:flex;white-space:normal;margin:8px 0}.artifact-table td:first-child{width:42px;text-align:center}.artifact-table td:first-child input{margin-top:2px}.artifact-table td>label{display:block}.sidebar-toggle{margin-inline-start:auto;border:1px solid var(--line);border-radius:6px;background:var(--bg);color:var(--muted);inline-size:30px;block-size:30px}.collapsed-tools{display:none}.app.sidebar-collapsed{grid-template-columns:58px minmax(0,1fr)}.app.sidebar-collapsed aside{padding:18px 9px}.app.sidebar-collapsed .brand{font-size:0;padding:0;justify-content:center}.app.sidebar-collapsed .mark,.app.sidebar-collapsed .sidebar-toggle{font-size:15px}.app.sidebar-collapsed .search,.app.sidebar-collapsed .filters,.app.sidebar-collapsed .tree,.app.sidebar-collapsed .sidebar-footer{display:none}.app.sidebar-collapsed .sidebar-toggle{margin:0}.app.sidebar-collapsed .collapsed-tools{display:grid;gap:10px;margin-top:34px}.collapsed-tool{inline-size:38px;min-block-size:38px;border:1px solid var(--line);border-radius:7px;background:var(--bg);font-size:12px;font-weight:700}.collapsed-tool.pending{color:oklch(.55 .14 75)}.collapsed-tool.blocked{color:var(--danger)}
    @media(max-width:1050px){.app{grid-template-columns:286px minmax(0,1fr)}.workspace{grid-template-columns:minmax(0,1fr) 260px}.content{padding:18px}.artifact-pane{padding:22px}.decision-panel{padding:22px}.priority-row{grid-template-columns:1fr auto}.priority-row .subtle{display:none}}@media(max-width:760px){.app{height:auto;min-height:100vh;display:block;overflow:visible}aside{height:43vh;min-height:320px;border-inline-end:0;border-bottom:1px solid var(--line);padding:14px}.tree{max-height:none}.sidebar-footer{display:none}.topbar{padding:15px 16px}.topbar h1{font-size:20px}.content{padding:14px;overflow:visible}.decisions{margin-bottom:12px}.priority-row{grid-template-columns:1fr auto;padding:12px}.workspace{display:block;min-height:0}.artifact-pane{padding:19px}.decision-panel{border-inline-start:0;border-top:1px solid var(--line);padding:19px}.artifact-head h2{font-size:24px}.folder-head{padding:4px 0 14px}.toolbar{align-items:flex-start;flex-direction:column}.topbar .sync{font-size:12px}.tabs{overflow:auto}.tab{white-space:nowrap}}@media(pointer:coarse){.chip,.tree-row,.btn,.tab{min-height:44px}.chip{padding:8px 12px}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{scroll-behavior:auto!important;transition:none!important;animation:none!important}}
  </style>
</head>
<body>
  <a class="skip" href="#main">Pular para o conteúdo</a>
  <div class="app">
    <aside aria-label="Navegador de documentação">
      <div class="brand"><span class="mark" aria-hidden="true">▣</span>Project Portal</div>
      <div class="search"><input id="search" type="search" placeholder="Buscar documentação…" aria-label="Buscar documentação"><span class="shortcut" aria-hidden="true">⌘K</span></div>
      <div id="filters" class="filters" aria-label="Filtros de documentação"></div>
      <nav id="tree" class="tree" aria-label="Árvore de documentação"></nav>
      <div class="sidebar-footer"><div class="identity">▦ <span>Workspace local</span></div><div class="identity"><span class="avatar">PP</span><span id="identity-name">Revisor</span></div></div>
    </aside>
    <main id="main" tabindex="-1"><header class="topbar"><h1 id="page-title">Revisão de documentação</h1><div class="sync"><span class="dot" aria-hidden="true"></span><span id="sync-text">Sincronizado localmente</span></div></header><div class="content"><section id="priority" class="decisions" aria-labelledby="priority-title"></section><section id="workspace" class="workspace" aria-live="polite"></section></div></main>
  </div>
  <dialog id="decision-dialog" aria-labelledby="dialog-title"><form id="decision-form" method="dialog" class="dialog-body"><h2 id="dialog-title"></h2><p id="dialog-description" class="subtle"></p><label>Seu nome<input id="approver" required autocomplete="name" maxlength="120"></label><label id="notes-label">Justificativa<textarea id="notes" rows="4" maxlength="3000"></textarea></label><p id="form-error" class="helper" role="alert"></p><div class="dialog-actions"><button class="btn" value="cancel">Cancelar</button><button id="confirm-decision" class="btn primary" value="confirm">Confirmar</button></div></form></dialog>
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
  <script>
  (()=>{
    const state={view:null,query:'',filter:'all',selectedId:null,selectedFolder:null,selected:new Set(),expanded:new Set(),tab:'content',revision:0,poll:null,decision:null};
    const $=s=>document.querySelector(s), esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const filters=[['all','Todos'],['pending','Pendentes'],['blocked','Bloqueados'],['changed','Alterados']];
    const statusLabel=s=>({approved:'Aprovado',rejected:'Solicita ajustes',in_progress:'Em andamento',implemented:'Implementado',validated:'Validado',released:'Liberado',proposed:'Pendente',draft:'Pendente'}[s]||'Sem status');
    const visualStatus=a=>a.derivedStatus==='stale'?'stale':a.derivedStatus==='blocked'||a.status==='rejected'?'blocked':a.status==='approved'||a.status==='released'?'approved':a.status==='in_progress'||a.status==='implemented'?'progress':a.status==='draft'||a.status==='proposed'?'pending':'neutral';
    const visualLabel=a=>a.derivedStatus==='stale'?'Alterado — requer revisão':a.derivedStatus==='missing'?'Arquivo indisponível':a.derivedStatus==='blocked'?'Bloqueado':statusLabel(a.status);
    const relative=t=>{if(!t)return 'sem data';const d=new Date(t),n=Date.now()-d; if(n<864e5)return 'atualizado hoje'; if(n<1728e5)return 'atualizado ontem'; return new Intl.DateTimeFormat('pt-BR',{dateStyle:'medium'}).format(d)};
    function toast(text){const el=$('#toast');el.textContent=text;el.classList.remove('hidden');clearTimeout(toast.timer);toast.timer=setTimeout(()=>el.classList.add('hidden'),4500)}
    const reviewerStorageKey='projectPortalApprover';
    function reviewerName(){return (localStorage.getItem(reviewerStorageKey)||'').trim()}
    async function saveReviewerName(value){localStorage.setItem(reviewerStorageKey,value);try{const response=await fetch('/api/preferences',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({reviewerName:value})});if(!response.ok)throw new Error('Não foi possível salvar a preferência do projeto.')}catch(error){toast(error.message||'O nome foi salvo apenas neste navegador.')}}
    async function restoreReviewerName(){try{const response=await fetch('/api/preferences');if(!response.ok)return;const preferences=await response.json();if(!reviewerName()&&preferences.reviewerName){localStorage.setItem(reviewerStorageKey,preferences.reviewerName);renderIdentity()}}catch(_){/* Local storage remains a safe fallback. */}}
    function setupIdentity(){const name=$('#identity-name'),card=name.parentElement;if(!$('#edit-identity')){const edit=document.createElement('button');edit.id='edit-identity';edit.type='button';edit.className='link';edit.textContent='Editar';card.classList.add('identity-user');card.append(edit);const form=document.createElement('form');form.id='identity-editor';form.className='identity-editor hidden';form.innerHTML='<input aria-label="Nome do revisor" autocomplete="name" maxlength="120" required><button class="btn" type="submit">Salvar</button><button class="btn" type="button">Cancelar</button>';card.after(form);edit.onclick=()=>{form.classList.remove('hidden');form.querySelector('input').value=reviewerName();form.querySelector('input').focus()};form.querySelector('button[type="button"]').onclick=()=>form.classList.add('hidden');form.onsubmit=async e=>{e.preventDefault();const value=form.querySelector('input').value.trim();if(!value)return;await saveReviewerName(value);renderIdentity();form.classList.add('hidden');toast('Nome salvo para este projeto.')}}renderIdentity()}
    function renderIdentity(){const name=reviewerName();$('#identity-name').textContent=name;const avatar=$('.avatar');if(avatar)avatar.textContent=name.split(/\s+/).slice(0,2).map(x=>x[0]).join('').toUpperCase()||'?'}
    function setupSidebar(){const app=$('.app'),brand=$('.brand'),aside=document.querySelector('aside'),stored=localStorage.getItem('projectPortalSidebarCollapsed')==='true';const toggle=document.createElement('button');toggle.type='button';toggle.className='sidebar-toggle';toggle.setAttribute('aria-label','Recolher navegador de documentação');brand.append(toggle);const tools=document.createElement('div');tools.className='collapsed-tools';tools.setAttribute('aria-label','Atalhos de revisão');aside.insertBefore(tools,$('.sidebar-footer'));const update=collapsed=>{app.classList.toggle('sidebar-collapsed',collapsed);toggle.textContent=collapsed?'›':'‹';toggle.setAttribute('aria-label',collapsed?'Expandir navegador de documentação':'Recolher navegador de documentação');toggle.setAttribute('aria-expanded',String(!collapsed));localStorage.setItem('projectPortalSidebarCollapsed',String(collapsed))};update(stored);toggle.onclick=()=>update(!app.classList.contains('sidebar-collapsed'))}
    function renderCollapsedTools(){const tools=$('.collapsed-tools');if(!tools||!state.view)return;const pending=state.view.artifacts.filter(a=>['draft','proposed'].includes(a.status)).length,blocked=state.view.artifacts.filter(a=>a.derivedStatus==='blocked'||a.status==='rejected').length;tools.innerHTML=`<button type="button" class="collapsed-tool pending" data-quick-filter="pending" title="${pending} pendências" aria-label="${pending} pendências">${pending}</button><button type="button" class="collapsed-tool blocked" data-quick-filter="blocked" title="${blocked} bloqueios" aria-label="${blocked} bloqueios">${blocked}</button>`;tools.onclick=e=>{const button=e.target.closest('[data-quick-filter]');if(!button)return;state.filter=button.dataset.quickFilter;$('.app').classList.remove('sidebar-collapsed');const toggle=$('.sidebar-toggle');toggle.textContent='‹';toggle.setAttribute('aria-label','Recolher navegador de documentação');toggle.setAttribute('aria-expanded','true');localStorage.setItem('projectPortalSidebarCollapsed','false');render()}}
    function matches(a){const q=state.query.toLocaleLowerCase();if(q&&!`${a.title} ${a.path} ${a.content}`.toLocaleLowerCase().includes(q))return false;if(state.filter==='pending')return ['draft','proposed'].includes(a.status);if(state.filter==='blocked')return a.derivedStatus==='blocked'||a.status==='rejected';if(state.filter==='changed')return a.derivedStatus==='stale';return true}
    function renderFilters(){ $('#filters').innerHTML=filters.map(([id,label])=>`<button class="chip" type="button" data-filter="${id}" aria-pressed="${state.filter===id}">${label}</button>`).join('');$('#filters').onclick=e=>{const b=e.target.closest('[data-filter]');if(b){state.filter=b.dataset.filter;render()}} }
    function folderTree(){const root={folders:new Map(),files:[]};for(const a of state.view.artifacts.filter(matches)){let node=root;const parts=a.path.split('/');parts.slice(0,-1).forEach((name,i)=>{if(!node.folders.has(name))node.folders.set(name,{folders:new Map(),files:[],path:parts.slice(0,i+1).join('/')});node=node.folders.get(name)});node.files.push(a)}return root}
    function treeHTML(node,depth=0){let out='';for(const [,folder] of [...node.folders].sort((a,b)=>a[0].localeCompare(b[0],'pt-BR'))){const selected=state.selectedFolder===folder.path,expanded=state.expanded.has(folder.path);out+=`<li><button type="button" class="tree-row" data-folder="${esc(folder.path)}" aria-current="${selected}" aria-expanded="${expanded}"><span class="indent" style="--indent:${depth*16}px"></span><span class="twisty">${expanded?'⌄':'›'}</span><span class="folder-icon">▱</span><span class="node-label">${esc(folder.path.split('/').at(-1))}</span></button>${expanded?`<ul>${treeHTML(folder,depth+1)}</ul>`:''}</li>`}for(const a of node.files.sort((a,b)=>a.title.localeCompare(b.title,'pt-BR'))){const selected=state.selectedId===a.id;out+=`<li><button type="button" class="tree-row" data-artifact="${esc(a.id)}" aria-current="${selected}"><span class="indent" style="--indent:${depth*16+23}px"></span><span>▤</span><span class="node-label">${esc(a.title)}</span><span class="tree-status ${visualStatus(a)}">●</span></button></li>`}return out}
    function findFolder(node,path){for(const folder of node.folders.values()){if(folder.path===path)return folder;const found=findFolder(folder,path);if(found)return found}return null}
    function expandToNextFiles(folder){state.expanded.add(folder.path);if(folder.files.length)return;for(const child of folder.folders.values()){state.expanded.add(child.path);if(!child.files.length)expandToNextFiles(child)}}
    function collapseFolder(path){for(const expanded of [...state.expanded])if(expanded===path||expanded.startsWith(path+'/'))state.expanded.delete(expanded)}
    function renderTree(){const root=folderTree(),markup=treeHTML(root);$('#tree').innerHTML=markup?`<ul>${markup}</ul>`:'<p class="empty">Nenhum documento encontrado.</p>';$('#tree').onclick=e=>{const a=e.target.closest('[data-artifact]'),f=e.target.closest('[data-folder]');if(a){state.selectedId=a.dataset.artifact;state.selectedFolder=null;state.selected.clear()}if(f){const path=f.dataset.folder;state.selectedFolder=path;state.selectedId=null;state.selected.clear();if(state.expanded.has(path))collapseFolder(path);else{const folder=findFolder(root,path);if(folder)expandToNextFiles(folder)}}render()}}
    function priorityArtifacts(){return state.view.artifacts.filter(a=>['draft','proposed'].includes(a.status)||a.derivedStatus==='blocked'||a.derivedStatus==='stale').slice(0,3)}
    function renderPriority(){const list=priorityArtifacts();$('#priority').innerHTML=`<h2 id="priority-title">Precisa da sua decisão${list.length?` <span class="subtle">(${list.length})</span>`:''}</h2>${list.length?list.map(a=>{const reason=a.blockers[0]||(a.derivedStatus==='stale'?'Há alterações que exigem revisão.':'Pronto para sua análise.');return `<button type="button" class="priority-row" data-priority="${esc(a.id)}"><span><span class="priority-title">${esc(a.title)}</span><span class="subtle">${esc(a.type)}</span></span><span class="status ${visualStatus(a)}">${esc(visualLabel(a))}</span><span class="subtle">${esc(reason)}</span><span class="review-link">Revisar →</span></button>`}).join(''):'<p class="empty">Nenhuma decisão pendente agora.</p>'}`;$('#priority').onclick=e=>{const b=e.target.closest('[data-priority]');if(b){state.selectedId=b.dataset.priority;state.selectedFolder=null;render()}} }
    function markdown(text){const lines=String(text||'').replace(/\r\n?/g,'\n').split('\n'),out=[];let paragraph=[];const inline=value=>esc(value).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\[([^\]]+)\]\(([^ )]+)\)/g,'<a href="$2" target="_blank" rel="noreferrer">$1</a>');const flush=()=>{if(paragraph.length){out.push(`<p>${paragraph.map(inline).join('<br>')}</p>`);paragraph=[]}};for(let i=0;i<lines.length;i++){const line=lines[i],heading=line.match(/^(#{1,3})\s+(.+)$/);if(heading){flush();out.push(`<h${heading[1].length}>${inline(heading[2])}</h${heading[1].length}>`);continue}if(/^[-*]\s+/.test(line)){flush();const items=[];while(i<lines.length&&/^[-*]\s+/.test(lines[i])){items.push(`<li>${inline(lines[i].replace(/^[-*]\s+/,''))}</li>`);i++}i--;out.push(`<ul>${items.join('')}</ul>`);continue}if(/^\|.*\|\s*$/.test(line)&&i+1<lines.length&&/^\|?\s*:?-{3,}/.test(lines[i+1])){flush();const rows=[];while(i<lines.length&&/^\|.*\|\s*$/.test(lines[i])){if(!/^\|?\s*:?-{3,}/.test(lines[i]))rows.push(lines[i].slice(1,-1).split('|').map(cell=>inline(cell.trim())));i++}i--;const head=rows.shift()||[];out.push(`<table><thead><tr>${head.map(cell=>`<th>${cell}</th>`).join('')}</tr></thead><tbody>${rows.map(row=>`<tr>${row.map(cell=>`<td>${cell}</td>`).join('')}</tr>`).join('')}</tbody></table>`);continue}if(!line.trim()){flush();continue}paragraph.push(line)}flush();return out.join('')}
    function contentView(artifact){const source=artifact.content||'O conteúdo deste arquivo não está disponível.';if(artifact.view?.renderer==='graph'||artifact.path.toLowerCase().endsWith('.json')){try{return `<article class="document"><pre aria-label="JSON formatado"><code>${esc(JSON.stringify(JSON.parse(source),null,2))}</code></pre></article>`}catch(_){return `<article class="document"><pre aria-label="Conteúdo JSON"><code>${esc(source)}</code></pre></article>`}}return `<article class="document">${markdown(source)}</article>`}
    function artifactById(id){return state.view.artifacts.find(a=>a.id===id)}
    function revealArtifact(id){const artifact=artifactById(id);if(!artifact)return;const parts=artifact.path.split('/');for(let i=1;i<parts.length;i++)state.expanded.add(parts.slice(0,i).join('/'));state.selectedId=id;state.selectedFolder=null;state.selected.clear();state.tab='content';render()}
    function renderArtifact(){const a=artifactById(state.selectedId)||state.view.artifacts[0];if(!a){$('#workspace').innerHTML='<div class="empty">Ainda não há artefatos registrados neste projeto.</div>';return}state.selectedId=a.id;const parentArtifacts=a.parents.map(id=>artifactById(id)||{id,title:id});const parentNames=parentArtifacts.map(item=>item.title);const childNames=a.children.map(id=>artifactById(id)?.title||id); const tabContent=state.tab==='content'?contentView(a):state.tab==='details'?`<div class="document"><h2>Dados do artefato</h2><p><strong>Tipo:</strong> ${esc(a.type)}<br><strong>Status:</strong> ${esc(statusLabel(a.status))}<br><strong>Maturidade:</strong> ${esc(a.maturity||'não declarada')}<br><strong>Adaptador de aprovação:</strong> ${esc(a.approvalAdapter||'genérico')}</p></div>`:state.tab==='relations'?`<div class="document"><h2>Relações</h2><h3>Depende de</h3>${parentNames.length?`<ul>${parentNames.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`:'<p>Não há dependências registradas.</p>'}<h3>Impacta</h3>${childNames.length?`<ul>${childNames.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`:'<p>Não há artefatos dependentes registrados.</p>'}</div>`:`<div class="document"><h2>Histórico</h2>${a.latestApproval?`<p><strong>${esc(a.latestApproval.status)}</strong> por ${esc(a.latestApproval.by)} em ${esc(relative(a.latestApproval.at))}.</p><p>${esc(a.latestApproval.notes||'Sem observações.')}</p>`:'<p>Nenhuma decisão foi registrada para este artefato.</p>'}</div>`;
      $('#workspace').innerHTML=`<section class="artifact-pane"><div class="artifact-head"><div><h2>${esc(a.title)}</h2><span class="status ${visualStatus(a)}">${esc(visualLabel(a))}</span><div class="facts"><span>▤ Tipo: ${esc(a.type)}</span><span>◷ ${esc(relative(a.updated))}</span><span>⌁ ${a.parents.length+a.children.length} relações</span></div></div></div><div class="tabs" role="tablist" aria-label="Detalhes do artefato">${[['content','Conteúdo'],['details','Detalhes'],['relations','Relações'],['history','Histórico']].map(([id,label])=>`<button class="tab" type="button" role="tab" data-tab="${id}" aria-selected="${state.tab===id}">${label}</button>`).join('')}</div>${tabContent}</section><aside class="decision-panel" aria-label="Decisão do artefato"><div><h2>${a.derivedStatus==='blocked'?'Revisão bloqueada':'Pronto para revisão'}</h2><p class="subtle">${a.derivedStatus==='blocked'?esc(a.blockers.join(' ')):'Leia o conteúdo e os impactos antes de registrar sua decisão.'}</p></div><div class="panel-section"><h3>Impacto</h3><span class="subtle">${a.children.length?`Afeta ${a.children.length} artefato(s) relacionado(s).`:'Nenhum impacto downstream registrado.'}</span></div><div class="panel-section"><h3>Dependências</h3>${parentNames.length?parentNames.map(x=>`<span class="relation">⌁ ${esc(x)}</span>`).join(''):'<span class="subtle">Sem dependências registradas.</span>'}</div><div class="actions"><button class="btn primary" type="button" data-action="approve" ${a.derivedStatus==='blocked'||a.status==='approved'?'disabled':''}>Aprovar</button><button class="btn" type="button" data-action="changes">Solicitar ajustes</button><p class="helper">Solicitar ajustes requer uma justificativa e devolve o documento para revisão.</p></div></aside>`;
      const dependencyHeading=[...document.querySelectorAll('#workspace .decision-panel h3')].find(x=>x.textContent==='Dependências');if(dependencyHeading){const panel=dependencyHeading.parentElement;panel.innerHTML=`<h3>Dependências</h3>${parentArtifacts.length?parentArtifacts.map(item=>`<button type="button" class="relation link" data-relation="${esc(item.id)}">⌁ ${esc(item.title)}</button>`).join(''):'<span class="subtle">Sem dependências registradas.</span>'}`}
      if(state.decision&&['changes','batch-changes'].includes(state.decision.kind)){const form=document.createElement('div');form.className='inline-request';form.innerHTML=`<label for="request-notes">Justificativa obrigatória</label><textarea id="request-notes" rows="4" maxlength="3000" placeholder="Descreva os ajustes necessários."></textarea><div class="inline-request-actions"><button class="btn primary" type="button" data-send-adjustments>Enviar ajustes</button><button class="btn" type="button" data-cancel-adjustments>Cancelar</button></div>`;$('#workspace .actions').append(form)}
      $('#workspace').onclick=e=>{const relation=e.target.closest('[data-relation]'),t=e.target.closest('[data-tab]'),action=e.target.closest('[data-action]');if(relation){revealArtifact(relation.dataset.relation);return}if(t){state.tab=t.dataset.tab;renderArtifact();return}if(action){openDecision(action.dataset.action,[a.id]);return}if(e.target.closest('[data-cancel-adjustments]')){state.decision=null;renderArtifact();return}const send=e.target.closest('[data-send-adjustments]');if(send)submitDecision(state.decision.kind,state.decision.ids,$('#request-notes').value,send)}
    }
    function folderArtifacts(){return state.view.artifacts.filter(a=>a.path.startsWith(state.selectedFolder+'/')&&matches(a))}
    function eligible(a){return ['draft','proposed','rejected'].includes(a.status)&&a.derivedStatus!=='blocked'&&a.derivedStatus!=='stale'&&a.derivedStatus!=='missing'}
    function renderFolder(){const items=folderArtifacts(),ready=items.filter(eligible),blocked=items.filter(a=>a.derivedStatus==='blocked').length,stale=items.filter(a=>a.derivedStatus==='stale').length;for(const a of [...state.selected])if(!items.some(x=>x.id===a)||!eligible(artifactById(a)))state.selected.delete(a);$('#workspace').innerHTML=`<section class="artifact-pane"><div class="folder-head"><div class="folder-icon-large">▱</div><div><h2>${esc(state.selectedFolder.split('/').at(-1))}</h2><div class="facts"><span>${items.length} documentos</span><span>${ready.length} prontos para aprovação</span><span>${blocked} bloqueados</span><span>${stale} alterados</span></div></div></div><div class="toolbar"><div class="selection"><input id="select-all" type="checkbox" aria-label="Selecionar documentos elegíveis" ${ready.length&&ready.every(a=>state.selected.has(a.id))?'checked':''}><strong>${state.selected.size} documentos selecionados</strong><button class="link" type="button" data-clear>Limpar seleção</button></div><button class="btn primary" type="button" data-batch ${state.selected.size?'':'disabled'}>Revisar e aprovar em lote</button></div><div class="table-wrap"><table class="artifact-table"><thead><tr><th scope="col">Documento</th><th scope="col">Status</th><th scope="col">Atualizado</th><th scope="col">Relações</th><th scope="col">Elegível</th></tr></thead><tbody>${items.map(a=>`<tr class="${state.selected.has(a.id)?'selected':''}"><td><label><input type="checkbox" data-select="${esc(a.id)}" ${state.selected.has(a.id)?'checked':''} ${eligible(a)?'':'disabled'}> <span class="artifact-name">${esc(a.title)}</span></label>${!eligible(a)?`<div class="row-reason">${esc(a.blockers[0]||visualLabel(a))}</div>`:''}</td><td><span class="status ${visualStatus(a)}">${esc(visualLabel(a))}</span></td><td>${esc(relative(a.updated))}</td><td>⌁ ${a.parents.length+a.children.length}</td><td>${eligible(a)?'✓':'—'}</td></tr>`).join('')}</tbody></table></div></section><aside class="decision-panel" aria-label="Revisão em lote"><div><h2>Revisão em lote</h2><p class="subtle">Selecione somente documentos elegíveis para decidir em conjunto.</p></div><div class="panel-section"><h3>Elegibilidade</h3><p class="status approved">${ready.length} podem ser aprovados</p><p class="status blocked">${blocked+stale} não elegíveis</p></div><div class="panel-section"><h3>Impacto da aprovação</h3><p class="subtle">A aprovação atualiza o histórico individual de cada documento.</p></div><div class="actions"><button class="btn primary" type="button" data-batch ${state.selected.size?'':'disabled'}>Aprovar ${state.selected.size||''} documento${state.selected.size===1?'':'s'}</button><button class="btn" type="button" data-batch-changes ${state.selected.size?'':'disabled'}>Solicitar ajustes</button><p class="helper">A aprovação em lote exige confirmação. Cada documento mantém seu histórico individual.</p></div></aside>`;
      const table=$('#workspace .artifact-table'),header=table.querySelector('thead tr');header.insertAdjacentHTML('afterbegin','<th scope="col" aria-label="Selecionar">Selecionar</th>');for(const row of table.querySelectorAll('tbody tr')){const documentCell=row.children[0],label=documentCell.querySelector('label'),checkbox=label?.querySelector('input[data-select]');if(!checkbox)continue;checkbox.setAttribute('aria-label',`Selecionar ${label.textContent.trim()}`);checkbox.remove();const selectionCell=document.createElement('td');selectionCell.append(checkbox);row.insertBefore(selectionCell,documentCell)}
      if(state.decision&&state.decision.kind==='batch-changes'){const form=document.createElement('div');form.className='inline-request';form.innerHTML=`<label for="request-notes">Justificativa obrigatória</label><textarea id="request-notes" rows="4" maxlength="3000" placeholder="Descreva os ajustes necessários para os documentos selecionados."></textarea><div class="inline-request-actions"><button class="btn primary" type="button" data-send-adjustments>Enviar ajustes</button><button class="btn" type="button" data-cancel-adjustments>Cancelar</button></div>`;$('#workspace .actions').append(form)}
      $('#workspace').onclick=e=>{const c=e.target.closest('[data-select]');if(c){c.checked?state.selected.add(c.dataset.select):state.selected.delete(c.dataset.select);renderFolder();return}if(e.target.closest('[data-clear]')){state.selected.clear();renderFolder();return}if(e.target.closest('[data-batch]')){openDecision('batch',[...state.selected]);return}if(e.target.closest('[data-batch-changes]')){openDecision('batch-changes',[...state.selected]);return}if(e.target.closest('[data-cancel-adjustments]')){state.decision=null;renderFolder();return}const send=e.target.closest('[data-send-adjustments]');if(send)submitDecision(state.decision.kind,state.decision.ids,$('#request-notes').value,send)};$('#select-all').onchange=e=>{ready.forEach(a=>e.target.checked?state.selected.add(a.id):state.selected.delete(a.id));renderFolder()}
    }
    function render(){if(!state.view)return;renderFilters();renderTree();renderPriority();renderCollapsedTools();state.selectedFolder?renderFolder():renderArtifact();$('#page-title').textContent=state.selectedFolder?'Documentação':'Revisão de documentação';}
    async function submitDecision(kind,ids,notes='',button){const reject=kind==='changes'||kind==='batch-changes',approvedBy=reviewerName();if(!approvedBy){toast('Defina seu nome antes de registrar uma decisão.');$('#edit-identity')?.click();return}if(reject&&!notes.trim()){toast('Informe a justificativa para solicitar ajustes.');return}if(button){button.disabled=true;button.textContent='Registrando…'}try{if(kind==='batch')await api('/api/batch-approve',{artifactIds:ids,approvedBy,notes,confirmed:true});else if(kind==='batch-changes')await api('/api/batch-reject',{artifactIds:ids,approvedBy,notes,confirmed:true});else await api('/api/transition',{artifactId:ids[0],status:reject?'rejected':'approved',approvedBy,notes,confirmed:true});state.decision=null;toast(reject?'A solicitação de ajustes foi registrada.':'A decisão foi registrada com sucesso.');await load()}catch(err){toast(err.message||'Não foi possível registrar a decisão.')}finally{if(button){button.disabled=false;button.textContent=reject?'Enviar ajustes':'Aprovar'}}}
    function openDecision(kind,ids){if(!ids.length)return;if(kind==='approve'||kind==='batch'){submitDecision(kind,ids);return}state.decision={kind,ids};render()}
    async function api(url,body){const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||'Erro inesperado.')}return r.json()}
    function normalizeView(view){view.artifacts=Array.isArray(view.artifacts)?view.artifacts:[];view.files=Array.isArray(view.files)?view.files:[];for(const artifact of view.artifacts){artifact.parents=Array.isArray(artifact.parents)?artifact.parents:[];artifact.children=Array.isArray(artifact.children)?artifact.children:[];artifact.blockers=Array.isArray(artifact.blockers)?artifact.blockers:[];artifact.content=artifact.content||''}return view}
    async function load(){try{$('#sync-text').textContent='Atualizando…';const r=await fetch('/api/project-view');if(!r.ok)throw new Error('Não foi possível carregar a documentação.');state.view=normalizeView(await r.json());state.revision=state.view.revision;const valid=state.view.artifacts.some(a=>a.id===state.selectedId);if(!valid)state.selectedId=state.view.artifacts[0]?.id||null;$('#sync-text').textContent='Sincronizado localmente';render();watch()}catch(err){$('#workspace').innerHTML=`<div class="empty"><p>${esc(err.message)}</p><button class="btn" type="button" onclick="location.reload()">Tentar novamente</button></div>`;$('#sync-text').textContent='Falha ao atualizar'}}
    async function watch(){state.poll?.abort();const c=new AbortController();state.poll=c;try{const r=await fetch(`/api/project-view/changes?since=${state.revision}&wait=25`,{signal:c.signal});const x=await r.json();if(x.changed)await load();else watch()}catch(e){if(e.name!=='AbortError')setTimeout(watch,2500)}}
    $('#search').addEventListener('input',e=>{state.query=e.target.value;render()});document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();$('#search').focus()}if(e.key==='Escape'&&state.decision){state.decision=null;render()}});setupIdentity();setupSidebar();restoreReviewerName().finally(load);
  })();
  </script>
